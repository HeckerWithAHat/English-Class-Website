<!doctype html>
<html lang="en" data-theme="lofi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A collaborative companion site for Foundation by Isaac Asimov."
    />
    <title>{% block title %}Foundation Project{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/file/turn.js"></script>
    <style>
      :root{
        --bg-dark-0: #1a1313;
        --bg-dark-1: #2f1c1c;
        --bg-dark-2: #1f1616;
        --accent-yellow: #f5c34d; /* softened gold */
        --accent-red: #7f1d1d; /* deep maroon */
        --accent-yellow-soft: rgba(245, 195, 77, 0.10);
        --accent-red-soft: rgba(127, 29, 29, 0.10);
        --linear-start: #f5c34d;
        --linear-end: #7f1d1d;
        --frame-border: rgba(254, 240, 138, 0.45);
        --cover-highlight: rgba(250, 204, 21, 0.50);
        --back-border: rgba(212, 212, 216, 0.35);
      }

      html, body {
        height: 100%;
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at 20% 20%, var(--accent-yellow-soft), transparent 30%),
          radial-gradient(circle at 80% 80%, var(--accent-red-soft), transparent 32%),
          linear-gradient(160deg, var(--bg-dark-2) 0%, var(--bg-dark-1) 50%, var(--bg-dark-0) 100%);
        transition: 360ms ease;
        font-family: "Inter", "ui-sans-serif", system-ui, sans-serif;
      }

      /* Book styling with depth and shadow */
      #flipbook {
        width: 900px;
        height: 600px;
        aspect-ratio: 3 / 2;
        max-width: 100%;
        max-height: calc(100vh - 10rem);
        filter: drop-shadow(0 20px 60px rgba(0, 0, 0, 0.8)) drop-shadow(0 0 40px rgba(0, 0, 0, 0.4));
        transition: filter 300ms ease;
      }

      #flipbook:hover {
        filter: drop-shadow(0 25px 80px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 60px rgba(0, 0, 0, 0.5));
      }

      #flipbook .page {
        background-clip: padding-box;
        box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.1);
      }

      /* Ensure hard page backgrounds always fill the page cleanly */
      #flipbook .hard,
      #flipbook .page.hard {
        background-position: center center !important;
        background-repeat: no-repeat !important;
        background-size: cover !important;
      }

      #foundation-book .cover-page {
        position: relative;
        color: #fff9e8;
        padding: 2rem;
        background:
          linear-gradient(160deg, rgba(69, 10, 10, 0.9) 0%, rgba(127, 29, 29, 0.9) 55%, rgba(180, 83, 9, 0.9) 100%),
          radial-gradient(circle at 80% 18%, var(--cover-highlight), transparent 36%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      #foundation-book .cover-page::after {
        content: "";
        position: absolute;
        inset: 0.8rem;
        border: 2px solid var(--frame-border);
        pointer-events: none;
      }

      #foundation-book .inside-page {
        background: linear-gradient(180deg, #f9f4e8 0%, #efe7d8 100%);
        padding: 2.5rem;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        box-shadow: inset 3px 0 15px rgba(0, 0, 0, 0.08);
        position: relative;
      }

      #foundation-book .inside-page::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(180deg, rgba(127, 29, 29, 0.3) 0%, rgba(127, 29, 29, 0.05) 100%);
        pointer-events: none;
      }

      #foundation-book .back-cover {
        position: relative;
        background:
          linear-gradient(165deg, rgba(63, 63, 70, 0.96) 0%, rgba(39, 39, 42, 0.95) 100%),
          radial-gradient(circle at 20% 30%, rgba(212,212,216,0.28), transparent 40%);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        padding: 2rem;
        color: #d4d4d8;
      }

      #foundation-book .back-cover::after {
        content: "";
        position: absolute;
        inset: 0.9rem;
        border: 1px solid var(--back-border);
        pointer-events: none;
      }

      /* Page content styles */
      .page-heading {
        font-size: 2rem;
        font-weight: 700;
        color: var(--accent-red);
        margin-bottom: 1.5rem;
        letter-spacing: -0.02em;
        text-transform: uppercase;
        font-size: clamp(1.5rem, 5vw, 2.25rem);
      }

      .page-subheading {
        font-size: 1.25rem;
        font-weight: 600;
        color: #5a4a3a;
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
        letter-spacing: -0.01em;
      }

      .page-content {
        font-size: 1rem;
        line-height: 1.7;
        color: #3a3a3a;
      }

      .page-content p {
        margin-bottom: 1rem;
      }

      .page-content ul, .page-content ol {
        margin-left: 1.5rem;
        margin-bottom: 1rem;
      }

      .page-content li {
        margin-bottom: 0.5rem;
        line-height: 1.6;
      }

      /* Navigation container */
      .book-controls {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 1rem;
        align-items: center;
        background: rgba(26, 19, 19, 0.85);
        backdrop-filter: blur(12px);
        padding: 1rem 1.5rem;
        border-radius: 999px;
        border: 1px solid rgba(245, 195, 77, 0.2);
        z-index: 100;
        animation: slideUp 400ms ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      .nav-button {
        background: linear-gradient(135deg, rgba(245, 195, 77, 0.15), rgba(127, 29, 29, 0.15));
        border: 1px solid rgba(245, 195, 77, 0.3);
        color: #f5c34d;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.875rem;
        transition: all 200ms ease;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        user-select: none;
      }

      .nav-button:hover:not(:disabled) {
        background: linear-gradient(135deg, rgba(245, 195, 77, 0.25), rgba(127, 29, 29, 0.2));
        border-color: rgba(245, 195, 77, 0.5);
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(245, 195, 77, 0.15);
      }

      .nav-button:active:not(:disabled) {
        transform: translateY(0);
      }

      .nav-button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .page-indicator {
        color: #f5c34d;
        font-weight: 600;
        font-size: 0.875rem;
        min-width: 4rem;
        text-align: center;
        letter-spacing: 0.05em;
      }

      .page-progress {
        width: 120px;
        height: 3px;
        background: rgba(127, 29, 29, 0.3);
        border-radius: 999px;
        overflow: hidden;
        border: 1px solid rgba(245, 195, 77, 0.2);
      }

      .page-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #f5c34d, #7f1d1d);
        border-radius: 999px;
        transition: width 300ms ease;
      }

      /* Home button styling */
      .home-button {
        position: fixed;
        top: 1.5rem;
        left: 1.5rem;
        background: linear-gradient(135deg, rgba(245, 195, 77, 0.35), rgba(127, 29, 29, 0.35));
        border: 2px solid rgba(245, 195, 77, 0.6);
        color: #fff9e8;
        padding: 0.75rem 1.25rem;
        border-radius: 0.5rem;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.875rem;
        transition: all 200ms ease;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        user-select: none;
        z-index: 110;
        backdrop-filter: blur(12px);
        text-decoration: none;
        animation: slideDown 400ms ease-out;
        box-shadow: 0 4px 15px rgba(245, 195, 77, 0.2);
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .home-button:hover {
        background: linear-gradient(135deg, rgba(245, 195, 77, 0.45), rgba(127, 29, 29, 0.35));
        border-color: rgba(245, 195, 77, 0.8);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(245, 195, 77, 0.3);
      }

      .home-button:active {
        transform: translateY(0);
      }

      @media (max-width: 1024px) {
        .home-button {
          top: 1rem;
          left: 1rem;
          padding: 0.6rem 1rem;
          font-size: 0.8rem;
        }
      }

      @media (max-width: 640px) {
        .home-button {
          top: 0.75rem;
          left: 0.75rem;
          padding: 0.5rem 0.8rem;
          font-size: 0.75rem;
        }

        .home-button span:not(.icon) {
          display: none;
        }
      }

      @media (max-width: 1024px) {
        .page-shell {
          padding-bottom: 2rem;
        }

        .book-layout {
          min-height: calc(100vh - 4rem);
        }

        #flipbook {
          width: min(94vw, 900px);
          height: auto;
          max-height: calc(100vh - 11rem);
          aspect-ratio: 3 / 2;
        }

        .book-controls {
          bottom: 1rem;
          padding: 0.75rem 1rem;
          gap: 0.75rem;
        }

        .nav-button {
          padding: 0.4rem 0.8rem;
          font-size: 0.8rem;
        }

        .page-indicator {
          font-size: 0.75rem;
          min-width: 3.5rem;
        }

        .page-progress {
          width: 80px;
        }
      }

      @media (max-width: 640px) {
        body {
          background-attachment: scroll;
        }

        main {
          padding-top: 3.75rem;
          padding-bottom: 4.5rem;
        }

        #flipbook {
          width: calc(100vw - 0.75rem);
          height: auto;
          max-height: calc(100vh - 8.5rem);
          transform-origin: center top;
          aspect-ratio: 3 / 2;
        }

        .book-controls {
          bottom: 0.75rem;
          left: 0.75rem;
          transform: none;
          flex-wrap: wrap;
          justify-content: center;
          width: calc(100vw - 1.5rem);
          padding: 0.75rem 0.9rem;
          gap: 0.5rem;
        }

        .page-progress {
          width: 100%;
          order: 5;
        }

        .page-indicator {
          min-width: 3rem;
        }

        .nav-button {
          flex: 1 1 0;
          justify-content: center;
        }

        .home-button {
          top: 0.75rem;
          left: 0.75rem;
          padding: 0.5rem 0.75rem;
        }

        .home-button span:not(.icon) {
          display: none;
        }
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body class="min-h-screen text-base-content z-40">
    <!-- Home Button -->
    <a href="{{ url_for('home') }}" class="home-button" aria-label="Back to home">
      <span>←</span>
      <span class="icon">Home</span>
    </a>

    <main id="foundation-book" class="flex flex-row h-screen w-full justify-center items-center px-4">
      <div class="flex flex-col justify-center items-center">
        <div id="flipbook">
          <div class="hard bg-[url(/file/cover.png)] bg-cover rounded-lg"></div>
          <div class="hard bg-[url(/file/blank.png)] bg-cover rounded-lg"></div>
          {% block book_pages %}{% endblock %}
          <div class="hard bg-[url(/file/blank.png)] bg-cover rounded-lg"></div>
          <div class="hard bg-[url(/file/back.png)] bg-cover rounded-lg"></div>
        </div>
      </div>
    </main>

    <!-- Navigation Controls -->
    <div class="book-controls">
      <button class="nav-button" id="prevBtn" aria-label="Previous page">
        <span>←</span>
        <span class="hidden sm:inline">Back</span>
      </button>
      
      <div class="page-indicator">
        <span id="currentPage">1</span> / <span id="totalPages">1</span>
      </div>

      <div class="page-progress">
        <div class="page-progress-bar" id="progressBar" style="width: 0%"></div>
      </div>

      <button class="nav-button" id="nextBtn" aria-label="Next page">
        <span class="hidden sm:inline">Next</span>
        <span>→</span>
      </button>
    </div>
  </body>
    <script>
      // Initialize TurnJS with professional settings
    const $flipbook = $("#flipbook");

    const BOOK_WIDTH = 900;
    const BOOK_HEIGHT = 600;
    const MOBILE_BREAKPOINT = 1024;

    // Compute the largest scale that fits both available width and height while preserving aspect ratio
    const getBookSize = () => {
      const viewportWidth = Math.max(320, window.innerWidth);
      const viewportHeight = Math.max(480, window.innerHeight);

      const horizontalPadding = 12; // accounts for page padding/margins
      const verticalPadding = 140; // accounts for controls/headers

      const availableWidth = Math.max(320, viewportWidth - horizontalPadding);
      const availableHeight = Math.max(360, viewportHeight - verticalPadding);

      // Determine scale that fits within both dimensions, but not exceeding 1 (native size)
      const scale = Math.min(availableWidth / BOOK_WIDTH, availableHeight / BOOK_HEIGHT, 1);

      const width = Math.max(320, Math.round(BOOK_WIDTH * scale));
      const height = Math.max(200, Math.round(BOOK_HEIGHT * scale));

      return { width, height };
    };

    let bookSize = getBookSize();

    $flipbook.turn({
      width: bookSize.width,
      height: bookSize.height,
      autoCenter: true,
      acceleration: true,
      duration: 800,
    });

    // Book interaction tracking
    let currentPage = 1;
    let totalPages = 1;

    // Update page indicators
    function updatePageIndicators() {
      const pages = $flipbook.turn("pages");
      currentPage = $flipbook.turn("page");
      totalPages = pages;
      
      document.getElementById("currentPage").textContent = currentPage;
      document.getElementById("totalPages").textContent = totalPages;
      
      // Update progress bar
      const progressPercent = ((currentPage - 1) / (totalPages - 1)) * 100;
      document.getElementById("progressBar").style.width = progressPercent + "%";
      
      // Update button states
      document.getElementById("prevBtn").disabled = currentPage <= 1;
      document.getElementById("nextBtn").disabled = currentPage >= totalPages;
    }

    // Navigation event listeners
    document.getElementById("nextBtn").addEventListener("click", () => {
      const pages = $flipbook.turn("pages");
      if (currentPage < pages) {
        $flipbook.turn("next");
      }
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
      if (currentPage > 1) {
        $flipbook.turn("previous");
      }
    });

    // Keyboard navigation
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " ") {
        e.preventDefault();
        const pages = $flipbook.turn("pages");
        if (currentPage < pages) {
          $flipbook.turn("next");
        }
      } else if (e.key === "ArrowLeft") {
        e.preventDefault();
        if (currentPage > 1) {
          $flipbook.turn("previous");
        }
      }
    });

    // Update indicators when page changes
    $flipbook.bind("turned", function(event, page, view) {
      updatePageIndicators();
    });

    // Initialize on page load
    setTimeout(() => {
      updatePageIndicators();
    }, 100);

    // Keep the flipbook sized to the viewport without changing the desktop layout.
    window.addEventListener("resize", () => {
      const nextSize = getBookSize();
      if (nextSize.width === bookSize.width && nextSize.height === bookSize.height) {
        return;
      }

      bookSize = nextSize;
      if ($flipbook.data("turn")) {
        $flipbook.turn("size", bookSize.width, bookSize.height);
        $flipbook.turn("center");
        updatePageIndicators();
      }
    });

    // Dynamic gradient background following cursor
    (() => {
      const body = document.body;
      if (!body) return;

      let x = 20;
      let y = 20;
      let rafId = 0;

      const clamp = (n, min, max) => Math.min(max, Math.max(min, n));
      const rootStyles = () => getComputedStyle(document.documentElement);

      const paintBackground = () => {
        rafId = 0;

        const x2 = 100 - x;
        const y2 = 100 - y;

        const dx = x2 - x;
        const dy = y2 - y;
        const dividerAngle = (Math.atan2(dy, dx) * 180) / Math.PI + 90;

        const styles = rootStyles();
        const yellowSoft = styles.getPropertyValue('--accent-yellow-soft').trim() || 'rgba(245,195,77,0.10)';
        const redSoft = styles.getPropertyValue('--accent-red-soft').trim() || 'rgba(127,29,29,0.10)';
        const linearStart = styles.getPropertyValue('--linear-start').trim() || '#f5c34d';
        const linearEnd = styles.getPropertyValue('--linear-end').trim() || '#7f1d1d';

        body.style.background = `
          radial-gradient(circle at ${x.toFixed(2)}% ${y.toFixed(2)}%, ${yellowSoft}, transparent 30%),
          radial-gradient(circle at ${x2.toFixed(2)}% ${y2.toFixed(2)}%, ${redSoft}, transparent 32%),
          linear-gradient(${dividerAngle.toFixed(2)}deg, ${linearStart} 0%, ${linearEnd} 100%)
        `;
      };

      const updateFromPointer = (event) => {
        const rect = body.getBoundingClientRect();
        if (!rect.width || !rect.height) return;

        x = clamp(((event.clientX - rect.left) / rect.width) * 100, 0, 100);
        y = clamp(((event.clientY - rect.top) / rect.height) * 100, 0, 100);

        if (!rafId) rafId = requestAnimationFrame(paintBackground);
      };

      window.addEventListener("pointermove", updateFromPointer, { passive: true });
      paintBackground();
    })();
  </script>
</html>
